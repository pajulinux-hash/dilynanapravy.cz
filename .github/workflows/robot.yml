name: Noční Robot - Díly na nápravy

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  aktualizace:
    runs-on: ubuntu-latest

    steps:
    - name: Stáhnutí kódu
      uses: actions/checkout@v4

    - name: Nastavení Pythonu
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Instalace knihoven
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Spuštění robota
      run: python robot.py

    - name: Uložení dat (pokud jsou změny)
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add data.json
        git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Automatická aktualizace dílů na nápravy"
        git push
